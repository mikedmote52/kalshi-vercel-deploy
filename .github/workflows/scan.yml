name: Kalshi Scan and Deploy

on:
  schedule:
    # Same cadence as the old Vercel crons:
    # 14:00 UTC daily (7am PT pre-market)
    - cron: "0 14 * * *"
    # 20:30 UTC weekdays (1:30pm PT mid-session)
    - cron: "30 20 * * 1-5"
  workflow_dispatch: {}  # manual trigger from Actions tab
  push:
    branches: [main]
    paths:
      - 'public/**'
      - '.github/workflows/scan.yml'

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  scan:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.commit.outputs.changed }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run scanner
        if: github.event_name != 'push'
        env:
          KALSHI_API_KEY_ID: ${{ secrets.KALSHI_API_KEY_ID }}
          KALSHI_PEM_KEY: ${{ secrets.KALSHI_PEM_KEY }}
        run: node scripts/scan.js

      - name: Commit refreshed data
        id: commit
        if: github.event_name != 'push'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/dashboard_data.json public/heartbeat.json
          if git diff --quiet --cached; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No changes to commit."
          else
            git commit -m "auto: refresh dashboard_data $(date -u +%Y-%m-%d_%H:%MZ)"
            git push
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

  deploy:
    needs: scan
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

      - id: deployment
        uses: actions/deploy-pages@v4
